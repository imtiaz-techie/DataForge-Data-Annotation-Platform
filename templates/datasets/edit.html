{% extends 'base.html' %}
{% block title %}Edit {{ dataset.name }} — DataForge{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-content">
    <h1 class="page-title">Edit Dataset</h1>
  </div>
  <a href="{% url 'datasets:detail' dataset.pk %}" class="btn btn-ghost">← Back</a>
</div>
<div class="glass-card" style="max-width:600px;margin:0 auto">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label class="form-label">Name</label>{{ form.name }}</div>
    <div class="form-group"><label class="form-label">Description</label>{{ form.description }}</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type</label>{{ form.file_type }}</div>
      <div class="form-group"><label class="form-label">Status</label>{{ form.status }}</div>
    </div>
    <div class="form-group"><label class="form-label">Label Classes</label>{{ form.label_classes_input }}</div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="edit-save-btn">Save Changes</button>
      <a href="{% url 'datasets:detail' dataset.pk %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
